[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build:backend"
# Deploy automático en cada push: sin watchPatterns.

[deploy]
startCommand = "./start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20"
CORS_ORIGIN = "https://hot-wheels-manager.vercel.app,https://hot-wheels-manager-jfsn91o9q-antonio-martnez-s-projects.vercel.app,https://system.evstoremx.com,https://www.system.evstoremx.com"
MONGODB_URI = "${{MONGODB_URI}}"
